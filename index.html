<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic-Oid 🎩 - Your Magic Effect Identification Expert</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
    .gradient-purple {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #9b4dca 100%);
    }
    .gradient-purple-light {
      background: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #e879f9 100%);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-indigo-900 to-purple-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function MagicOid() {
      const [imageFile, setImageFile] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [isPro, setIsPro] = useState(false);
      const [showUpgradeModal, setShowUpgradeModal] = useState(false);

      useEffect(() => {
        // Check for Pro status
        const subscription = localStorage.getItem('oid_subscription');
        const trialActive = localStorage.getItem('oid_pro_trial');
        const trialCount = parseInt(localStorage.getItem('oid_pro_trial_count') || '0');
        
        if (subscription) {
          const subData = JSON.parse(subscription);
          setIsPro(subData.active);
        } else if (trialActive === 'true' && trialCount > 0) {
          setIsPro(true);
        }

        // Check for Stripe redirect
        const params = new URLSearchParams(window.location.search);
        const proParam = params.get('pro');
        if (proParam) {
          localStorage.setItem('oid_subscription', JSON.stringify({
            tier: proParam,
            active: true,
            timestamp: Date.now()
          }));
          setIsPro(true);
          window.history.replaceState({}, '', window.location.pathname);
        }
      }, []);

      const handleImageSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 5 * 1024 * 1024) {
            setError("Image too large! Please use an image under 5MB.");
            return;
          }
          setImageFile(file);
          setError(null);
          setResult(null);
          
          const reader = new FileReader();
          reader.onloadend = () => {
            setImagePreview(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const analyzeImage = async (useProMode = false) => {
        if (!imageFile) {
          setError("Please select an image first");
          return;
        }

        // Check if trying to use Pro without access
        if (useProMode && !isPro) {
          setShowUpgradeModal(true);
          return;
        }

        setLoading(true);
        setError(null);

        try {
          const reader = new FileReader();
          reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            const mediaType = imageFile.type;

            const response = await fetch('/api/analyze-magic', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                image: {
                  data: base64Data,
                  mediaType: mediaType
                },
                proMode: useProMode
              }),
            });

            if (!response.ok) {
              throw new Error(`Analysis failed: ${response.status}`);
            }

            const data = await response.json();
            setResult(data);
            setLoading(false);

            // Handle Pro trial credits
            if (useProMode && isPro) {
              const trialActive = localStorage.getItem('oid_pro_trial');
              const subscription = localStorage.getItem('oid_subscription');
              
              if (trialActive === 'true' && !subscription) {
                const trialCount = parseInt(localStorage.getItem('oid_pro_trial_count') || '0');
                if (trialCount > 0) {
                  const newCount = trialCount - 1;
                  localStorage.setItem('oid_pro_trial_count', newCount.toString());
                  if (newCount === 0) {
                    setIsPro(false);
                    localStorage.removeItem('oid_pro_trial');
                    alert('✨ Free Pro credit used! Share your results to earn more, or subscribe for unlimited!');
                  }
                }
              }
            }
          };
          reader.readAsDataURL(imageFile);
        } catch (err) {
          setError(err.message || "Failed to analyze effect. Please try again.");
          setLoading(false);
        }
      };

      const generateShareImage = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = 1080;
        canvas.height = 1080;
        const ctx = canvas.getContext('2d');

        // Background gradient
        const gradient = ctx.createLinearGradient(0, 0, 1080, 1080);
        gradient.addColorStop(0, '#667eea');
        gradient.addColorStop(0.5, '#764ba2');
        gradient.addColorStop(1, '#9b4dca');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1080, 1080);

        // App Name/Logo (top)
        ctx.font = 'bold 48px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText('🎩 Magic-Oid', 540, 80);

        // User's Image (center)
        if (imagePreview) {
          const img = new Image();
          img.src = imagePreview;
          await new Promise(resolve => {
            img.onload = () => {
              const size = 600;
              const x = (1080 - size) / 2;
              const y = 150;
              ctx.drawImage(img, x, y, size, size);
              resolve();
            };
          });
        }

        // Identification (bottom section)
        const trickName = result?.analysis?.match(/\*\*EFFECT IDENTIFIED\*\*:(.+)/)?.[1]?.trim() || 'Magic Effect Identified!';
        ctx.font = 'bold 36px Arial';
        ctx.fillStyle = 'white';
        ctx.fillText('IDENTIFIED:', 540, 820);
        ctx.font = 'bold 42px Arial';
        ctx.fillText(trickName, 540, 880);
        
        // Pro badge if applicable
        if (result?.proMode) {
          ctx.font = 'bold 24px Arial';
          ctx.fillStyle = '#fbbf24';
          ctx.fillText('⭐ PRO ANALYSIS', 540, 930);
        }

        // URL (very bottom)
        ctx.font = 'bold 32px Arial';
        ctx.fillStyle = 'white';
        ctx.fillText('magicoid.vercel.app', 540, 1020);

        // Download
        const link = document.createElement('a');
        link.download = 'magic-effect-identification.png';
        link.href = canvas.toDataURL();
        link.click();

        // VIRAL LOOP: Award credit for sharing!
        const subscription = localStorage.getItem('oid_subscription');
        if (!subscription) {
          const trialCount = parseInt(localStorage.getItem('oid_pro_trial_count') || '0');
          const newCount = trialCount + 1;
          localStorage.setItem('oid_pro_trial', 'true');
          localStorage.setItem('oid_pro_trial_count', newCount.toString());
          setIsPro(true);
          alert(`🎉 Thanks for sharing! You earned 1 Pro credit! (${newCount} total)`);
        }
      };

      const unlockProForShare = () => {
        localStorage.setItem('oid_pro_trial', 'true');
        localStorage.setItem('oid_pro_trial_count', '1');
        setIsPro(true);
        setShowUpgradeModal(false);
        alert('🎉 Pro activated! Create a Pro analysis, then share it to earn more credits!');
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          {/* Header */}
          <div className="max-w-4xl mx-auto mb-8">
            <div className="text-center">
              <h1 className="text-5xl md:text-6xl font-black text-white mb-2 drop-shadow-lg">
                🎩 Magic-Oid
              </h1>
              <p className="text-xl md:text-2xl text-purple-200 font-semibold">
                Your Magic Effect Identification Expert
              </p>
              <p className="text-purple-300 mt-2">
                Free Forever • Pro Features Available
              </p>
              <div className="mt-2 flex justify-center items-center gap-4 text-sm text-purple-200">
                <a href="https://buymeacoffee.com/chrispteemagician" target="_blank" rel="noopener" className="hover:text-white transition">
                  ☕ Buy Me a Coffee
                </a>
                <span>•</span>
                <a href="https://feelfamous.co.uk" target="_blank" rel="noopener" className="hover:text-white transition">
                  🌟 FeelFamous Kudos
                </a>
              </div>
              {isPro && (
                <div className="mt-3 inline-block bg-yellow-500 text-purple-900 px-4 py-1 rounded-full font-bold text-sm">
                  ⭐ PRO ACTIVE
                </div>
              )}
            </div>
          </div>

          {/* Main Content */}
          <div className="max-w-4xl mx-auto">
            <div className="bg-white rounded-3xl shadow-2xl p-6 md:p-8">
              
              {/* Upload Section */}
              {!result && (
                <div className="text-center">
                  <h2 className="text-2xl font-black text-gray-800 mb-4">
                    Upload a Magic Effect Photo or Video Screenshot
                  </h2>
                  <p className="text-gray-600 mb-6">
                    Show me an effect setup, performance photo, or prop - I'll identify it and tell you how to learn it!
                  </p>

                  <label className="cursor-pointer block">
                    <input
                      type="file"
                      accept="image/*"
                      onChange={handleImageSelect}
                      className="hidden"
                    />
                    <div className="border-4 border-dashed border-purple-300 rounded-2xl p-12 hover:border-purple-500 hover:bg-purple-50 transition-all">
                      {imagePreview ? (
                        <img src={imagePreview} alt="Preview" className="max-h-96 mx-auto rounded-lg shadow-lg" />
                      ) : (
                        <div>
                          <div className="text-6xl mb-4">🎩✨</div>
                          <div className="text-xl font-bold text-gray-700 mb-2">Click to upload image</div>
                          <div className="text-gray-500">Max 5MB • JPG, PNG, WebP</div>
                        </div>
                      )}
                    </div>
                  </label>

                  {error && (
                    <div className="mt-4 bg-red-50 border-2 border-red-300 rounded-xl p-4 text-red-700">
                      {error}
                    </div>
                  )}

                  {imagePreview && (
                    <div className="mt-6 space-y-3">
                      <button
                        onClick={() => analyzeImage(false)}
                        disabled={loading}
                        className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-bold py-4 px-8 rounded-xl transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed text-lg shadow-lg"
                      >
                        {loading ? '🔮 Analyzing Magic...' : '✨ Identify This Effect (FREE)'}
                      </button>

                      <button
                        onClick={() => analyzeImage(true)}
                        disabled={loading}
                        className="w-full bg-gradient-to-r from-yellow-500 to-amber-500 hover:from-yellow-600 hover:to-amber-600 text-purple-900 font-bold py-4 px-8 rounded-xl transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed text-lg shadow-lg"
                      >
                        {loading ? '🔮 Analyzing Magic...' : '⭐ Pro Analysis (Method + Books + Tips)'}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* Results Section */}
              {result && (
                <div>
                  <div className="mb-6">
                    <img src={imagePreview} alt="Analyzed" className="max-h-64 mx-auto rounded-lg shadow-lg" />
                  </div>

                  <div className={`p-6 rounded-2xl ${result.proMode ? 'bg-gradient-to-br from-yellow-50 to-amber-50 border-2 border-yellow-400' : 'bg-purple-50 border-2 border-purple-200'}`}>
                    {result.proMode && (
                      <div className="mb-4 text-center">
                        <span className="inline-block bg-yellow-500 text-purple-900 px-4 py-2 rounded-full font-bold text-sm">
                          ⭐ PRO ANALYSIS - Method Revealed!
                        </span>
                      </div>
                    )}
                    
                    <div className="prose max-w-none">
                      <div className="whitespace-pre-wrap text-gray-800 leading-relaxed">
                        {result.analysis}
                      </div>
                    </div>
                  </div>

                  <div className="mt-6 flex gap-3 flex-wrap justify-center">
                    <button
                      onClick={() => {
                        setImageFile(null);
                        setImagePreview(null);
                        setResult(null);
                      }}
                      className="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-6 rounded-lg transition-all flex items-center gap-2"
                    >
                      <span>🔄</span>
                      Identify Another Effect
                    </button>
                    
                    <button
                      onClick={generateShareImage}
                      className="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-semibold py-3 px-6 rounded-lg transition-all flex items-center gap-2 transform hover:scale-105"
                    >
                      <span>📤</span>
                      Share Results
                    </button>

                                    <button
                  onClick={() => {
                    // Pass data to SpicyLister
                    const magicData = {
                      source: 'Magic-Oid',
                      item: {
                        title: result?.analysis?.match(/\*\*EFFECT IDENTIFIED\*\*:(.+)/)?.[1]?.trim() || 'Magic Effect',
                        description: result?.analysis || '',
                        category: 'Magic & Illusions',
                        condition: 'N/A',
                        imageUrl: imagePreview
                      }
                    };
                    // Store data for SpicyLister to pick up
                    localStorage.setItem('spicylister_import', JSON.stringify(magicData));
                    // Open SpicyLister
                    window.open('https://spicylister.com?import=magic-oid', '_blank');
                  }}
                  className="bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white font-semibold py-3 px-6 rounded-lg transition-all flex items-center gap-2 transform hover:scale-105"
                >
                  <span>🛒</span>
                  Sell This with SpicyLister
                </button>
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-purple-200 text-sm">
              <p className="mb-2">
                Built by <a href="https://ko-fi.com/zoom" target="_blank" rel="noopener" className="font-bold hover:text-white">Chris P Tee</a> • Magic Circle Magician • 30+ Years Experience
              </p>
              <p>
                Part of the -Oid Family • Respect the art, learn the skills
              </p>
            </div>
          </div>

          {/* Upgrade Modal */}
          {showUpgradeModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
                
                {/* Header */}
                <div className="text-center mb-6">
                  <h2 className="text-2xl font-black text-gray-800 mb-2">
                    ✨ Unlock Pro Features!
                  </h2>
                  <p className="text-gray-600 mb-3">Method reveals, book references, and performance tips</p>
                  <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-3 text-sm text-gray-700">
                    <p className="font-semibold mb-1">🎩 For Magicians & Serious Learners</p>
                    <p className="text-xs">Pro features discuss methods using standard magic terminology (palms, forces, controls, glimpses). All techniques referenced are available in published magic literature. By upgrading, you confirm you're learning magic to perform and entertain, not to expose effects.</p>
                  </div>
                </div>

                {/* EARLY ADOPTER - Highlighted */}
                <div className="bg-gradient-to-br from-purple-50 to-pink-50 p-5 rounded-2xl border-2 border-purple-300 mb-3 relative">
                  <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full">
                    BEST VALUE!
                  </div>
                  <div className="text-center">
                    <div className="text-3xl font-black text-purple-900 mb-2">£4.95/month</div>
                    <div className="text-lg font-bold text-purple-800 mb-3">Early Adopter</div>
                    <div className="text-sm text-purple-700 mb-3">
                      ⭐ Works on ALL -Oid apps<br/>
                      🔒 Price locked at £4.95 FOREVER<br/>
                      🎯 Only 1,000 spots available
                    </div>
                    <a
                      href="https://buy.stripe.com/early-adopter-link"
                      className="block bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-xl transition"
                    >
                      Lock In £4.95 Forever
                    </a>
                  </div>
                </div>

                {/* REGULAR PRO */}
                <div className="bg-blue-50 p-5 rounded-2xl border-2 border-blue-200 mb-3">
                  <div className="text-center">
                    <div className="text-2xl font-black text-blue-900 mb-2">£9.95/month</div>
                    <div className="text-lg font-bold text-blue-800 mb-3">Regular Pro</div>
                    <div className="text-sm text-blue-700 mb-3">
                      All Pro features across all -Oid apps
                    </div>
                    <a
                      href="https://buy.stripe.com/regular-pro-link"
                      className="block bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition"
                    >
                      Subscribe Now
                    </a>
                  </div>
                </div>

                {/* RESELLER */}
                <div className="bg-green-50 p-5 rounded-2xl border-2 border-green-200 mb-3">
                  <div className="text-center">
                    <div className="text-2xl font-black text-green-900 mb-2">£49.95/month</div>
                    <div className="text-lg font-bold text-green-800 mb-3">Reseller Pro</div>
                    <div className="text-sm text-green-700 mb-3">
                      Bulk tools • API access • Priority support
                    </div>
                    <a
                      href="https://buy.stripe.com/reseller-link"
                      className="block bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition"
                    >
                      Go Pro
                    </a>
                  </div>
                </div>

                {/* COFFEE */}
                <div className="bg-yellow-50 p-5 rounded-2xl border-2 border-yellow-300 mb-3">
                  <div className="text-center">
                    <div className="text-2xl font-black text-yellow-900 mb-2">£3-5 one-time</div>
                    <div className="text-lg font-bold text-yellow-800 mb-3">Buy Me a Coffee</div>
                    <div className="text-sm text-yellow-700 mb-3">
                      7 days Pro access across all -Oid apps
                    </div>
                    <a
                      href="https://buymeacoffee.com/chrispteemagician"
                      target="_blank"
                      rel="noopener"
                      className="block bg-yellow-500 hover:bg-yellow-600 text-yellow-900 font-bold py-3 px-6 rounded-xl transition"
                    >
                      Support with Coffee ☕
                    </a>
                  </div>
                </div>

                {/* VIRAL FREE PRO */}
                <div className="text-center pt-4 border-t border-gray-200">
                  <p className="text-sm text-gray-600 mb-3">Or try Pro for free:</p>
                  <button
                    onClick={unlockProForShare}
                    className="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-105"
                  >
                    📤 Get 1 Free Pro Listing! 🎁
                  </button>
                  <p className="text-xs text-gray-500 mt-2">
                    Create a Pro analysis, then share it to earn more!
                  </p>
                </div>

                <button
                  onClick={() => setShowUpgradeModal(false)}
                  className="mt-4 w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg transition"
                >
                  Close
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<MagicOid />, document.getElementById('root'));
  </script>
</body>
</html>
